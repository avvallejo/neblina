# ============================================================================
# PRODUCCIÓN — un solo servidor (EC2) con Docker.
# Levantar / actualizar:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Diferencias con desarrollo: el frontend se sirve COMPILADO por Caddy con HTTPS
# automático; la base de datos NO expone puerto al exterior; todo reinicia solo
# si el servidor se reinicia. Está pensado para poder SEPARAR la base de datos
# después: apunta PGHOST a un RDS (en .env.prod) y quita el servicio "db".
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: cafeteria-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: cafeteria
      CAFETERIA_APP_PASSWORD: ${CAFETERIA_APP_PASSWORD}
    volumes:
      - cafeteria_db_data:/var/lib/postgresql/data
      - ./docker/00_roles_y_permisos.sh:/docker-entrypoint-initdb.d/00_roles_y_permisos.sh:ro
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_functions_triggers.sql:/docker-entrypoint-initdb.d/02_functions_triggers.sql:ro
      # El seed de demostración contiene PIN conocidos y nunca se ejecuta en producción.
      - ./db/04_views.sql:/docker-entrypoint-initdb.d/04_views.sql:ro
      - ./db/05_mejoras_produccion.sql:/docker-entrypoint-initdb.d/05_mejoras_produccion.sql:ro
      - ./db/06_costos_indirectos.sql:/docker-entrypoint-initdb.d/06_costos_indirectos.sql:ro
      - ./db/07_verificacion_y_sync.sql:/docker-entrypoint-initdb.d/07_verificacion_y_sync.sql:ro
      - ./db/08_configuracion.sql:/docker-entrypoint-initdb.d/08_configuracion.sql:ro
      - ./db/09_tiempo_extraccion_por_tipo.sql:/docker-entrypoint-initdb.d/09_tiempo_extraccion_por_tipo.sql:ro
      - ./db/10_security_hardening.sql:/docker-entrypoint-initdb.d/10_security_hardening.sql:ro
    restart: unless-stopped
    networks: [cafeteria-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cafeteria"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    container_name: cafeteria-api
    environment:
      PORT: 3000
      # PGHOST=db usa la base en Docker (este servidor). Para mover la base a
      # RDS u otro servidor: define PGHOST (y PG*) en .env.prod y quita "db".
      PGHOST: ${PGHOST:-db}
      PGPORT: ${PGPORT:-5432}
      PGUSER: ${PGUSER:-cafeteria_app}
      PGPASSWORD: ${CAFETERIA_APP_PASSWORD}
      PGDATABASE: ${PGDATABASE:-cafeteria}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      SMS_COUNTRY_CODE: ${SMS_COUNTRY_CODE:-52}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      NODE_ENV: production
      # 2 = portero frontal + Caddy. Usa 1 cuando Caddy recibe al cliente directamente.
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-2}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks: [cafeteria-net]

  web:
    build:
      context: ./frontend
      target: prod
    container_name: cafeteria-web
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-api:3000}
      # Detrás del PORTERO (servidor compartido): SITE_ADDRESS=:80 -> sirve HTTP
      # interno y el portero pone el HTTPS. NO publica puertos al host.
      # Servidor DEDICADO (handoff): pon SITE_ADDRESS=tu-dominio + ACME_EMAIL en
      # .env.prod y agrega aquí  ports: ["80:80","443:443"].
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      ACME_EMAIL: ${ACME_EMAIL:-}
    depends_on:
      - api
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks: [cafeteria-net, web-proxy]

networks:
  cafeteria-net:
    name: cafeteria-net
  web-proxy:
    external: true   # red compartida con el portero (docker network create web-proxy)

volumes:
  cafeteria_db_data:
    name: cafeteria_db_data
  caddy_data:
    name: cafeteria_caddy_data
  caddy_config:
    name: cafeteria_caddy_config
