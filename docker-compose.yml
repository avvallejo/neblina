version: "3.9"

# Nombres de red/volúmenes/contenedores con prefijo "cafeteria-" a propósito:
# así "docker ps", "docker network ls" y "docker volume ls" se entienden de
# un vistazo aunque tengas otros proyectos corriendo en Docker al mismo
# tiempo, y nada de aquí pisa los nombres por defecto ("db", "api", etc.) que
# Compose usaría si no se especifican.

services:
  db:
    image: postgres:16-alpine
    container_name: cafeteria-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres_dev_only}
      POSTGRES_DB: cafeteria
      CAFETERIA_APP_PASSWORD: ${CAFETERIA_APP_PASSWORD:-dev_password_local_only}
    ports:
      # Host:Contenedor — cambia DB_HOST_PORT en .env si el 5432 ya lo usa
      # otro proyecto tuyo; el contenedor sigue escuchando en 5432 por dentro,
      # así que la API no necesita saber nada de este cambio.
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - cafeteria_db_data:/var/lib/postgresql/data
      # Se montan UNO POR UNO (no toda la carpeta) para controlar el orden
      # exacto en que Postgres los corre la primera vez que crea el volumen
      # (docker-entrypoint-initdb.d los ejecuta en orden alfabético):
      - ./docker/00_roles_y_permisos.sh:/docker-entrypoint-initdb.d/00_roles_y_permisos.sh:ro
      - ./db/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/02_functions_triggers.sql:/docker-entrypoint-initdb.d/02_functions_triggers.sql:ro
      - ./db/03_seed_data.sql:/docker-entrypoint-initdb.d/03_seed_data.sql:ro
      - ./db/04_views.sql:/docker-entrypoint-initdb.d/04_views.sql:ro
      - ./db/05_mejoras_produccion.sql:/docker-entrypoint-initdb.d/05_mejoras_produccion.sql:ro
      - ./db/06_costos_indirectos.sql:/docker-entrypoint-initdb.d/06_costos_indirectos.sql:ro
      - ./db/07_verificacion_y_sync.sql:/docker-entrypoint-initdb.d/07_verificacion_y_sync.sql:ro
      - ./db/08_configuracion.sql:/docker-entrypoint-initdb.d/08_configuracion.sql:ro
      - ./db/09_tiempo_extraccion_por_tipo.sql:/docker-entrypoint-initdb.d/09_tiempo_extraccion_por_tipo.sql:ro
      - ./db/10_security_hardening.sql:/docker-entrypoint-initdb.d/10_security_hardening.sql:ro
    networks:
      - cafeteria-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cafeteria"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
    container_name: cafeteria-api
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: cafeteria_app
      PGPASSWORD: ${CAFETERIA_APP_PASSWORD:-dev_password_local_only}
      PGDATABASE: cafeteria
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      SMS_COUNTRY_CODE: ${SMS_COUNTRY_CODE:-52}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cafeteria-net

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: cafeteria-frontend
    environment:
      # El frontend llama a rutas "/api/..." y Vite las reenvía a la API por la
      # red interna de Compose (servicio "api"), no a localhost del host.
      VITE_API_PROXY: http://api:3000
    ports:
      # FRONTEND_HOST_PORT=5175 por defecto para no chocar con el 5173 de cvs-erp;
      # por dentro Vite sigue en 5173.
      - "${FRONTEND_HOST_PORT:-5175}:5173"
    depends_on:
      - api
    networks:
      - cafeteria-net

networks:
  cafeteria-net:
    name: cafeteria-net

volumes:
  cafeteria_db_data:
    name: cafeteria_db_data
